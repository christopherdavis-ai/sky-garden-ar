<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Garden AR — London Client Beams</title>

    <link rel="stylesheet" href="https://cdn.maptiler.com/maptiler-sdk-js/v3.0.1/maptiler-sdk.css" />


    <link rel="stylesheet" href="/src/styles/.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <h1>Sky Garden Client Map</h1>
        <p class="meta">Origin: 51.511398, -0.083507 @ 155m</p>

        <div class="controls">
          <label class="toggle-row"><span>Night / Day</span><input id="dayToggle" type="checkbox" /></label>


        <div class="controls">
          <label class="toggle-row">
            <span>Night / Day</span>
            <input id="dayToggle" type="checkbox" />
          </label>


          <label>Beam Height <input id="beamHeight" type="range" min="50" max="220" value="120" /></label>
          <label>Beam Radius <input id="beamRadius" type="range" min="2" max="15" value="5" /></label>
          <label>Glow Strength <input id="glowStrength" type="range" min="0.1" max="1" step="0.05" value="0.45" /></label>
        </div>
 
        <label class="toggle-row"><span>Payment Flows</span><input id="flowToggle" type="checkbox" checked /></label>


 
        <h2>Clients</h2>
        <ul id="clientList"></ul>
        <a href="/ar.html" class="ar-link">Open AR Mode</a>
      </aside>
 
      <><div id="map"></div></>

      <>
        <canvas id="scene"></canvas>
      </>
 
    </div>
    <script type="module" src="/src/.js"></script>
  </body>
</html>
