<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sky Garden AR Experience — TrueLayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #060606; font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    .hidden { display: none !important; }

    #camera-feed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    #ar-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

    /* ---- LOADING ---- */
    #loading-overlay {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #060606; color: white; text-align: center; padding: 2rem;
    }
    #loading-overlay h1 { font-size: 2rem; color: #AFADFF; margin-bottom: 1rem; }
    #loading-overlay p { color: #888; font-size: 0.95rem; margin-top: 0.4rem; }

    /* ---- iOS PERMISSION ---- */
    #ios-permission {
      position: fixed; inset: 0; z-index: 30;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.95); color: white; text-align: center; padding: 2rem;
    }
    #ios-permission h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    #ios-permission p { color: #aaa; margin-bottom: 2rem; max-width: 300px; }
    #ios-permission button {
      background: #4D3BD8; color: white; border: none; padding: 1rem 3rem;
      border-radius: 50px; font-size: 1.1rem; font-weight: 600; cursor: pointer;
    }

    /* ---- CALIBRATION ---- */
    #calibration-overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      background: transparent; color: white; text-align: center;
    }
    #cal-step1 {
      background: rgba(0,0,0,0.9); border-radius: 18px; padding: 1.5rem;
      max-width: 360px; width: 90%;
    }
    #cal-step1 h1 { font-size: 1.5rem; margin-bottom: .4rem; }
    #cal-step1 p { font-size: .9rem; color:#aaa; margin-bottom: 1.2rem; }
    .cal-grid { display:grid; grid-template-columns:1fr 1fr; gap:.6rem; }
    .cal-landmark-btn {
      display:flex; flex-direction:column; align-items:center; gap:.25rem;
      background:rgba(77,59,216,.18); border:1px solid rgba(77,59,216,.6);
      color:#fff; padding:.9rem .5rem; border-radius:12px; font-size:.95rem;
      font-weight:600; cursor:pointer;
    }
    .cal-landmark-btn small { color:#9aa; font-weight:400; font-size:.7rem; }
    .cal-landmark-btn:active { transform:scale(.96); }
    .cal-ico { font-size:1.4rem; }

    #cal-step2 { position:fixed; inset:0; pointer-events:none; }
    #cal-step2 button { pointer-events:auto; }
    #cal-vline {
      position:fixed; top:0; bottom:0; left:50%; width:2px; transform:translateX(-50%);
      background:rgba(255,255,255,.55);
    }
    #cal-reticle {
      position:fixed; top:50%; left:50%; width:120px; height:120px;
      transform:translate(-50%,-50%); border:3px solid #fff; border-radius:14px;
      transition:border-color .15s, box-shadow .15s;
    }
    #cal-reticle.aligned { border-color:#34d399; box-shadow:0 0 24px rgba(52,211,153,.85); }
    #cal-arrow {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size:3rem; color:#fff; text-shadow:0 0 8px #000;
    }
    #cal-panel {
      position:fixed; left:0; right:0; bottom:1.5rem; text-align:center;
      display:flex; flex-direction:column; align-items:center; gap:.3rem;
    }
    #cal-name { font-size:1.3rem; font-weight:700; text-shadow:0 1px 4px #000; }
    #cal-hint { font-size:.95rem; color:#eee; text-shadow:0 1px 4px #000; }
    #cal-deg { font-size:.8rem; color:#bbb; margin-bottom:.4rem; text-shadow:0 1px 4px #000; }
    #cal-lock-btn {
      background:#4D3BD8; color:#fff; border:none; padding:.9rem 3rem; border-radius:50px;
      font-size:1.1rem; font-weight:700; cursor:pointer; opacity:.55;
      transition:opacity .15s, transform .1s, box-shadow .15s;
    }
    #cal-lock-btn.ready { opacity:1; box-shadow:0 0 22px rgba(77,59,216,.85); }
    #cal-lock-btn:active { transform:scale(.95); }
    #cal-back-btn { background:transparent; color:#bbb; border:none; padding:.5rem; font-size:.85rem; cursor:pointer; }

    /* ---- HUD ---- */
    #hud {
      position: fixed; top: max(0.8rem, env(safe-area-inset-top)); left: 0.8rem; z-index: 5; color: #E7E6FF;
      font-size: 0.72rem; background: rgba(6,6,6,0.5); padding: 0.45rem 0.7rem;
      border: 1px solid rgba(175,173,255,0.3); border-radius: 10px; pointer-events: none; line-height: 1.5;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    #hud-mode { color: #AFADFF; font-weight: 700; }

    /* ---- CONTROLS (compact brand chips + More menu) ---- */
    #ar-controls {
      position: fixed; bottom: max(0.9rem, env(safe-area-inset-bottom)); left: 50%;
      transform: translateX(-50%); z-index: 5;
      display: flex; gap: 0.6rem; flex-wrap: nowrap; align-items: flex-start; justify-content: center;
      max-width: 98vw; pointer-events: none;
    }
    #ar-controls button { pointer-events: auto; cursor: pointer; color: #fff; font-family: inherit; }
    #ar-controls .tl-chip {
      width: 54px; height: 54px; padding: 0; border-radius: 50%;
      border: 1px solid rgba(175,173,255,0.45); background: rgba(6,6,6,0.5);
      font-size: 0; position: relative; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.35); transition: transform .12s, background .15s, border-color .15s;
    }
    #ar-controls .tl-chip::before { font-size: 24px; line-height: 1; }
    #ar-controls .tl-chip::after {
      content: attr(data-label); position: absolute; top: 56px; left: 50%; transform: translateX(-50%);
      font-size: 10px; font-weight: 700; color: rgba(231,230,255,0.9); white-space: nowrap;
      text-shadow: 0 1px 3px rgba(0,0,0,0.85); pointer-events: none;
    }
    #ar-controls .tl-chip:active { transform: scale(0.9); }
    #disco-btn.tl-chip::before { content: '\01FAA9'; }
    #disco-btn.tl-chip.active { background: linear-gradient(135deg,#AFADFF,#4D3BD8); border-color: transparent; }
    #snap-btn.tl-chip { background: linear-gradient(135deg,#AFADFF,#4D3BD8); border-color: transparent; }
    #snap-btn.tl-chip::before { content: '\01F4F8'; }
    #q-launch.tl-chip::before { content: '\01F3AF'; }
    #q-launch.tl-chip.active::before { content: '\2715'; }
    #q-launch.tl-chip.active { background: rgba(220,40,40,0.92); border-color: transparent; }
    #q-booth.tl-chip::before { content: '\01F933'; }
    #tl-more.tl-chip::before { content: '\22EF'; font-size: 30px; font-weight: 800; }

    #tl-more-panel {
      position: fixed; left: 50%; bottom: 92px; transform: translateX(-50%); z-index: 6;
      display: none; flex-direction: column; gap: 0.4rem; min-width: 190px; pointer-events: auto;
      background: rgba(6,6,6,0.85); border: 1px solid rgba(175,173,255,0.4); border-radius: 14px;
      padding: 0.55rem; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 14px 44px rgba(0,0,0,0.55);
    }
    #tl-more-panel.open { display: flex; }
    #tl-more-panel button {
      width: 100%; text-align: left; border-radius: 10px; padding: 0.7rem 0.9rem;
      font-size: 0.9rem; font-weight: 600; white-space: nowrap;
      background: rgba(175,173,255,0.12); border: 1px solid rgba(175,173,255,0.25);
    }
    #tl-more-panel button.active { background: linear-gradient(135deg,#AFADFF,#4D3BD8); color: #060606; border-color: transparent; }

    @media (orientation: landscape) and (max-height: 520px) {
      #ar-controls { bottom: max(0.4rem, env(safe-area-inset-bottom)); gap: 0.45rem; }
      #ar-controls .tl-chip { width: 44px; height: 44px; }
      #ar-controls .tl-chip::before { font-size: 20px; }
      #ar-controls .tl-chip::after { top: 45px; font-size: 9px; }
      #tl-more.tl-chip::before { font-size: 26px; }
      #tl-more-panel { bottom: 66px; }
      #hud { font-size: 0.62rem; padding: 0.3rem 0.5rem; }
    }

    #exit-fs-btn {
      position: fixed; top: 1rem; right: 1rem; z-index: 6;
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: rgba(0,0,0,0.55); color: white; font-size: 1.1rem;
      cursor: pointer; pointer-events: auto;
    }
  </style>
</head>
<body>
  <video id="camera-feed" autoplay playsinline muted></video>
  <canvas id="ar-canvas"></canvas>

  <div id="loading-overlay">
    <h1>TrueLayer</h1>
    <p>Sky Garden AR Experience</p>
    <p style="color:#555;">Loading camera...</p>
  </div>

  <div id="ios-permission" class="hidden">
    <h1>Enable Motion Sensors</h1>
    <p>This AR experience needs access to your device's compass and motion sensors.</p>
    <button id="ios-permission-btn">Allow Access</button>
  </div>

  <div id="calibration-overlay" class="hidden">
    <div id="cal-step1">
      <h1>Calibrate your view</h1>
      <p>Pick a landmark you can see, then point your phone at it.</p>
      <div class="cal-grid">
        <button class="cal-landmark-btn" data-landmark="shard"><span class="cal-ico">🏙️</span>The Shard<small>South</small></button>
        <button class="cal-landmark-btn" data-landmark="tower-bridge"><span class="cal-ico">🌉</span>Tower Bridge<small>South-East</small></button>
        <button class="cal-landmark-btn" data-landmark="gherkin"><span class="cal-ico">🥒</span>The Gherkin<small>North-East</small></button>
        <button class="cal-landmark-btn" data-landmark="canary-wharf"><span class="cal-ico">🏢</span>Canary Wharf<small>East</small></button>
      </div>
    </div>
    <div id="cal-step2" class="hidden">
      <div id="cal-vline"></div>
      <div id="cal-reticle"></div>
      <div id="cal-arrow"></div>
      <div id="cal-panel">
        <div id="cal-name">The Shard</div>
        <div id="cal-hint">Find it in view</div>
        <div id="cal-deg"></div>
        <button id="cal-lock-btn">LOCK</button>
        <button id="cal-back-btn">← Pick another</button>
      </div>
    </div>
  </div>

  <div id="hud" class="hidden">
    <div id="hud-heading">Heading: --°</div>
    <div id="hud-beams">Beams visible: --</div>
    <div id="hud-mode"></div>
  </div>

  <button id="exit-fs-btn" class="hidden">✕</button>

  <div id="ar-controls" class="hidden">
    <button id="recalibrate-btn">🔄 Recalibrate</button>
    <button id="disco-btn">🪩 Disco</button>
    <button id="light-btn">🌓 Auto</button>
    <button id="test-btn">🔧 Test Mode</button>
    <button id="snap-btn">📸 Snap</button>
  </div>

  <script type="module" src="/src/ar-main.js"></script>
</body>
</html>
