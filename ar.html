<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="screen-orientation" content="any">
  <title>Sky Garden AR — TrueLayer</title>
  <link rel="stylesheet" href="/src/styles/ar.css">
</head>
<body>
  <video id="camera-feed" playsinline autoplay muted></video>
  <canvas id="ar-canvas"></canvas>

  <!-- Fullscreen exit button -->
  <button id="exit-fs-btn" class="hidden" aria-label="Exit fullscreen">✕</button>

  <!-- Loading -->
  <div id="loading-overlay" class="overlay">
    <div class="overlay-content">
      <img src="/logos/truelayer.svg" alt="TrueLayer" class="overlay-logo">
      <h1>Sky Garden AR</h1>
      <p>Loading camera…</p>
    </div>
  </div>

  <!-- iOS permission -->
  <div id="ios-permission" class="overlay hidden">
    <div class="overlay-content">
      <h1>Enable Motion Sensors</h1>
      <p>This AR experience needs access to your device's compass and motion sensors.</p>
      <button id="ios-permission-btn" class="btn-primary">Allow Access</button>
    </div>
  </div>

  <!-- Calibration -->
  <div id="calibration-overlay" class="overlay hidden">
    <div class="overlay-content">
      <h1>Calibrate AR</h1>
      <p>Point your phone at <strong>The Shard</strong> and tap below</p>
      <button id="calibrate-btn" class="btn-primary">I'm pointing at The Shard</button>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="hud-info">
      <div id="hud-heading">Heading: --°</div>
      <div id="hud-beams">Beams visible: --</div>
      <div id="hud-mode"></div>
    </div>
  </div>

  <!-- Bottom controls -->
  <div id="ar-controls" class="hidden">
    <button id="recalibrate-btn" class="btn-control btn-recalibrate">🔄 Recalibrate</button>
    <button id="snap-btn" class="btn-control btn-snap">📸</button>
    <button id="test-btn" class="btn-control btn-test">Test Mode</button>
  </div>

  <script type="module" src="/src/ar-main.js"></script>
</body>
</html>
